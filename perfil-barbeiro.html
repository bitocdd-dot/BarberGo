<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<title>Perfil do Barbeiro</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;

padding:20px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.foto{
width:120px;
height:120px;
border-radius:100px;
background:url("https://images.unsplash.com/photo-1621605815971-fbc98d665033") center/cover;

}

.nome{

}

.avaliacao{

}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:30px;
}

.corte{
height:120px;
background-size:cover;
background-position:center;
border-radius:10px;
}

.btn{
margin-top:30px;
background:gold;
color:black;
border:none;
padding:18px;
width:100%;
font-weight:bold;

<body>

<div class="header">

<div class="foto"></div>

<div class="nome">Marcos Barber</div>

<button class="btn" onclick="chamar()">
Chamar Barbeiro

import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

authDomain: "barbergo-2f72c.firebaseapp.com",
projectId: "barbergo-2f72c",
storageBucket: "barbergo-2f72c.firebasestorage.app",
messagingSenderId: "862773297159",
appId: "1:862773297159:web:041ec66acd9fc4d9692aa2"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.chamar = function(){

set(ref(db,'pedidoAtual'),{

alert("Barbeiro chamado!")
