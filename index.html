<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberGo | Premium Experience</title>
    <style>
        :root { --gold: #D4AF37; --black: #0a0a0a; --zinc: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body {
            background-color: var(--black);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            /* Imagem de fundo luxuosa */
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                              url('https://images.unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .card {
            background: rgba(26, 26, 26, 0.95);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            max-width: 350px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .logo { font-size: 28px; font-weight: 900; color: var(--gold); margin-bottom: 10px; }
        .logo span { color: white; }

        h1 { font-size: 32px; margin-bottom: 15px; background: linear-gradient(to bottom, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #888; font-size: 15px; margin-bottom: 35px; line-height: 1.5; }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            display: block;
            text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
            border: none;
            width: 100%;
            cursor: pointer;
            font-family: inherit;
        }

        .footer-link { 
            margin-top: 25px; 
            color: #555; 
            font-size: 13px; 
            text-decoration: none; 
            display: block; 
            transition: 0.3s;
        }
        .footer-link:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">BARBER<span>GO</span></div>
        <h1>Sua barbearia, onde você estiver.</h1>
        <p>O serviço premium que você merece, agora na palma da sua mão.</p>
        
        <!-- BOTÃO PARA O CLIENTE -->
        <button class="btn" onclick="window.location.href='servicos.html'">Chamar Barbeiro</button>
        
        <!-- LINK CORRIGIDO PARA O PAINEL DO PROFISSIONAL -->
        <a href="painel-barbeiro.html" class="footer-link">Sou um profissional →</a>
    </div>

    <!-- LIGAÇÃO COM O CÉREBRO DO SITE -->
    <script type="module" src="main.js"></script>

</body>
</html>d
