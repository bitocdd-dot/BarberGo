<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarberGo | Premium Experience</title>
    <style>
        /* DESIGN PREMIUM EMBUTIDO */
        :root {
            --gold: #D4AF37;
            --black: #0a0a0a;
            --zinc: #1a1a1a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background-color: var(--black);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #0a0a0a 100%);
        }

        .card {
            background: var(--zinc);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-width: 350px;
            width: 100%;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .logo span { color: white; }

        h1 {
            font-size: 32px;
            line-height: 1.1;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
        }

        .btn:active { transform: scale(0.96); }

        .footer-link {
            margin-top: 25px;
            color: #555;
            font-size: 13px;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">BARBER<span>GO</span></div>
        <h1>Sua barbearia, onde você estiver.</h1>
        <p>O serviço premium que você merece, agora na palma da sua mão.</p>
        
        <a href="mapa.html" class="btn">Chamar Barbeiro</a>
        
        <a href="login-barbeiro.html" class="footer-link">Sou um profissional →</a>
    </div>

</body>
</html>
