<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Mapa BarberGo</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
padding:0;
}

#map{
height:100vh;
width:100%;
}

.top-bar{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
z-index:1000;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.menu{
position:absolute;
top:20px;
right:20px;
background:#111;
padding:10px;
border-radius:10px;
z-index:1000;
}

.menu button{
background:gold;
border:none;
padding:8px 10px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<div class="top-bar">
Barbeiros online perto de você
</div>

<div class="menu">
<button onclick="perfilCliente()">Perfil</button>
</div>

<div id="map"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyBe-xiVQFqy_rdw5pAUXmSQ7fQ6RZpLQ_Q",
authDomain: "barbergo-2f72c.firebaseapp.com",
projectId: "barbergo-2f72c",
storageBucket: "barbergo-2f72c.firebasestorage.app",
messagingSenderId: "862773297159",
appId: "1:862773297159:web:041ec66acd9fc4d9692aa2"
};

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)



const map = L.map('map').setView([-22.9068,-43.1729],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)



let clienteMarker



navigator.geolocation.watchPosition(function(position){

const lat = position.coords.latitude
const lng = position.coords.longitude

if(clienteMarker){

clienteMarker.setLatLng([lat,lng])

}else{

clienteMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Você")

map.setView([lat,lng],15)

}

})



/* BARBEIROS ONLINE */

const barbeirosRef = ref(db,'barbeirosOnline')

onValue(barbeirosRef,(snapshot)=>{

const data = snapshot.val()

if(!data) return

Object.keys(data).forEach((id)=>{

const barbeiro = data[id]

const marker = L.marker([barbeiro.lat,barbeiro.lng])
.addTo(map)
.bindPopup(
`
<b>${barbeiro.nome}</b><br>
⭐ ${barbeiro.avaliacao}<br><br>
<button onclick="abrirPerfil('${barbeiro.nome}')">
Ver perfil
</button>
`
)

})

})



window.abrirPerfil = function(nome){

localStorage.setItem("barbeiroSelecionado",nome)

window.location.href="perfil-barbeiro.html"

}



window.perfilCliente = function(){

alert("Perfil do cliente em breve")

}

</script>

</body>

</html>
