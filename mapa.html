<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Mapa BarberGo</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
padding:0;
}

#map{
height:100vh;
width:100%;
}

.info-box{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:white;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
z-index:1000;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

</style>

</head>

<body>

<div class="info-box">
Barbeiro a caminho do cliente
</div>

<div id="map"></div>

<script>

const map = L.map('map').setView([-22.9068,-43.1729],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)



let barbeiroMarker
let clienteMarker
let rotaLinha



let clienteLat = -22.9068
let clienteLng = -43.1729



clienteMarker = L.marker([clienteLat,clienteLng])
.addTo(map)
.bindPopup("Cliente BarberGo")



navigator.geolocation.watchPosition(function(position){

const lat = position.coords.latitude
const lng = position.coords.longitude



if(barbeiroMarker){

barbeiroMarker.setLatLng([lat,lng])

}else{

barbeiroMarker = L.marker([lat,lng])
.addTo(map)
.bindPopup("Barbeiro")

map.setView([lat,lng],15)

}



if(rotaLinha){

map.removeLayer(rotaLinha)

}



rotaLinha = L.polyline([
[lat,lng],
[clienteLat,clienteLng]
],
{color:'gold',weight:4}
).addTo(map)



})

</script>

</body>

</html>
