<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Barbeiro</title>

<style>

body{
background:#121212;
color:white;
font-family:Segoe UI;
text-align:center;
padding:30px;
}

.card{
background:#1e1e1e;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
}

h2{
margin-bottom:20px;
}

.status{
font-size:18px;
margin-bottom:20px;
}

.online{
color:lime;
}

.offline{
color:red;
}

button{
background:gold;
border:none;
padding:15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Painel do Barbeiro</h2>

<div class="status" id="status">
Status: OFFLINE
</div>

<button onclick="ficarOnline()">
Ficar Online
</button>

<button onclick="ficarOffline()">
Ficar Offline
</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {
apiKey: "AIzaSyBe-xiVQFqy_rdw5pAUXmSQ7fQ6RZpLQ_Q",
authDomain: "barbergo-2f72c.firebaseapp.com",
projectId: "barbergo-2f72c",
storageBucket: "barbergo-2f72c.firebasestorage.app",
messagingSenderId: "862773297159",
appId: "1:862773297159:web:041ec66acd9fc4d9692aa2"
};

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)



let barbeiroID = "barbeiro1"


window.ficarOnline = function(){

navigator.geolocation.getCurrentPosition(function(position){

const lat = position.coords.latitude
const lng = position.coords.longitude


set(ref(db,'barbeirosOnline/'+barbeiroID),{

nome:"Barbeiro BarberGo",
avaliacao:"4.9",
lat:lat,
lng:lng

})

document.getElementById("status").innerHTML =
"Status: <span class='online'>ONLINE</span>"

})

}



window.ficarOffline = function(){

remove(ref(db,'barbeirosOnline/'+barbeiroID))

document.getElementById("status").innerHTML =
"Status: <span class='offline'>OFFLINE</span>"

}

</script>

</body>
</html>
