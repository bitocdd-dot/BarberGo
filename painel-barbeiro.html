<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Barbeiro | BarberGo</title>

<style>

body{
margin:0;
background:#0a0a0a;
color:white;
font-family:Arial;
padding:20px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
color:gold;
}

.status{
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-bottom:20px;
text-align:center;
}

.status button{

background:gold;
border:none;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;

}

.cards{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:30px;

}

.card{

background:#1a1a1a;
padding:20px;
border-radius:15px;
text-align:center;

}

.numero{

font-size:28px;
font-weight:bold;
color:gold;

}

.menu{

display:flex;
flex-direction:column;
gap:15px;

}

.menu button{

background:#111;
border:none;
color:white;
padding:15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;

}

.menu button:hover{

background:gold;
color:black;

}

</style>

</head>

<body>

<div class="header">

<h1>Painel do Barbeiro</h1>
<p>Controle da sua conta BarberGo</p>

</div>


<div class="status">

<p>Status: <strong id="status">Offline</strong></p>

<button onclick="toggleOnline()">Ficar Online</button>

</div>


<div class="cards">

<div class="card">
<div class="numero">4.9</div>
<p>Avaliação média</p>
</div>

<div class="card">
<div class="numero">128</div>
<p>Clientes atendidos</p>
</div>

<div class="card">
<div class="numero">R$ 3.420</div>
<p>Ganhos totais</p>
</div>

<div class="card">
<div class="numero">12</div>
<p>Chamados hoje</p>
</div>

</div>


<div class="menu">

<button onclick="perfil()">Meu Perfil</button>

<button onclick="mapa()">Ver Mapa</button>

<button onclick="pagamentos()">Pagamentos</button>

<button onclick="suporte()">Suporte</button>

</div>



<script>

let online=false

function toggleOnline(){

online=!online

const status=document.getElementById("status")

if(online){

status.innerText="Online"
status.style.color="lime"

}else{

status.innerText="Offline"
status.style.color="red"

}

}

function perfil(){

window.location.href="perfil-barbeiro.html"

}

function mapa(){

window.location.href="mapa.html"

}

function pagamentos(){

window.location.href="pagamento.html"

}

function suporte(){

alert("Suporte BarberGo em breve")

}

</script>

</body>
</html>
